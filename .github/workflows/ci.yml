name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  tests:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: true
      matrix:
        php: ['8.3', '8.4', '8.5']
        laravel: ['11.*', '12.*', '13.*']

    name: PHP ${{ matrix.php }} — Laravel ${{ matrix.laravel }}

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, zlib, openssl, mbstring, libxml
          coverage: xdebug

      # Laravel 11 saiu do security support (mar/2026): todo 11.x carrega
      # advisories sem fix, e tanto o audit nativo do Composer (block-insecure)
      # quanto o roave/security-advisories tornam a resolucao impossivel.
      # Nesta leg de compatibilidade, ambos sao desativados de proposito;
      # as legs 12/13 e o job quality mantem os gates de seguranca.
      - name: Allow EOL Laravel 11
        if: matrix.laravel == '11.*'
        run: |
          composer remove roave/security-advisories --dev --no-update --no-interaction
          composer config audit.block-insecure false

      - name: Install dependencies
        run: |
          composer require "illuminate/http:${{ matrix.laravel }}" "illuminate/support:${{ matrix.laravel }}" "illuminate/contracts:${{ matrix.laravel }}" --no-interaction --no-update
          composer update --prefer-dist --no-interaction --no-progress

      - name: Run tests
        run: ./vendor/bin/pest --coverage --min=100

      - name: Run type coverage
        run: ./vendor/bin/pest --type-coverage --min=100

      - name: Generate Clover coverage report
        if: matrix.php == '8.4' && matrix.laravel == '12.*'
        run: ./vendor/bin/pest --coverage --coverage-clover=coverage.xml

      - name: Upload coverage to Codecov
        if: matrix.php == '8.4' && matrix.laravel == '12.*'
        uses: codecov/codecov-action@v6
        with:
          files: coverage.xml
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  quality:
    runs-on: ubuntu-latest
    name: Quality Checks

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, zlib, openssl, mbstring, libxml

      - name: Install dependencies
        run: composer update --prefer-dist --no-interaction --no-progress

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse

      - name: PHPStan (examples)
        run: ./vendor/bin/phpstan analyse -c phpstan-examples.neon

      - name: Psalm
        run: ./vendor/bin/psalm --taint-analysis

      - name: Rector
        run: ./vendor/bin/rector --dry-run

      - name: Pint
        run: ./vendor/bin/pint --test -p
